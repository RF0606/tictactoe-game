<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
    }

    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 1px; }
    .score-box .num   { font-size: 1.6rem; font-weight: bold; }
    #score-x .num { color: #e94560; }
    #score-o .num { color: #a8dadc; }
    #score-d .num { color: #aaa; }

    #controls {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    button {
      padding: 0.55rem 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }

    #btn-restart { background: #e94560; color: #fff; }
    #btn-reset   { background: #444; color: #eee; }

    #mode-toggle {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn.active { background: #e94560; color: #fff; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>

<div id="mode-toggle">
  <button class="mode-btn active" id="mode-2p">2 Players</button>
  <button class="mode-btn" id="mode-ai">vs CPU</button>
</div>

<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="scoreboard">
  <div class="score-box" id="score-x">
    <div class="label">X WINS</div>
    <div class="num" id="sx">0</div>
  </div>
  <div class="score-box" id="score-d">
    <div class="label">DRAWS</div>
    <div class="num" id="sd">0</div>
  </div>
  <div class="score-box" id="score-o">
    <div class="label">O WINS</div>
    <div class="num" id="so">0</div>
  </div>
</div>

<div id="controls">
  <button id="btn-restart">New Game</button>
  <button id="btn-reset">Reset Score</button>
</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, over, vsAI;
  let scores = { X: 0, O: 0, D: 0 };

  const cells   = document.querySelectorAll('.cell');
  const status  = document.getElementById('status');
  const sx      = document.getElementById('sx');
  const so      = document.getElementById('so');
  const sd      = document.getElementById('sd');
  const mode2p  = document.getElementById('mode-2p');
  const modeAI  = document.getElementById('mode-ai');

  function init() {
    board   = Array(9).fill('');
    current = 'X';
    over    = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = `${current}'s turn`;
  }

  function checkWin(b, p) {
    return WINS.find(([a, bx, c]) => b[a] === p && b[bx] === p && b[c] === p) || null;
  }

  function handleClick(i) {
    if (over || board[i]) return;
    if (vsAI && current === 'O') return;
    play(i);
  }

  function play(i) {
    board[i] = current;
    const cell = cells[i];
    cell.textContent = current;
    cell.classList.add(current.toLowerCase(), 'taken');

    const line = checkWin(board, current);
    if (line) {
      line.forEach(j => cells[j].classList.add('win'));
      status.textContent = `${current} wins!`;
      scores[current]++;
      updateScore();
      over = true;
      return;
    }

    if (board.every(v => v)) {
      status.textContent = "Draw!";
      scores.D++;
      updateScore();
      over = true;
      return;
    }

    current = current === 'X' ? 'O' : 'X';
    status.textContent = vsAI && current === 'O' ? "CPU is thinking…" : `${current}'s turn`;

    if (vsAI && current === 'O' && !over) {
      setTimeout(cpuMove, 350);
    }
  }

  function updateScore() {
    sx.textContent = scores.X;
    so.textContent = scores.O;
    sd.textContent = scores.D;
  }

  // Minimax AI
  function minimax(b, isMax) {
    if (checkWin(b, 'O')) return  10;
    if (checkWin(b, 'X')) return -10;
    if (b.every(v => v))  return   0;

    let best = isMax ? -Infinity : Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = isMax ? 'O' : 'X';
        const score = minimax(b, !isMax);
        b[i] = '';
        best = isMax ? Math.max(best, score) : Math.min(best, score);
      }
    }
    return best;
  }

  function cpuMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, false);
        board[i] = '';
        if (score > best) { best = score; move = i; }
      }
    }
    if (move !== -1) play(move);
  }

  cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));

  document.getElementById('btn-restart').addEventListener('click', init);

  document.getElementById('btn-reset').addEventListener('click', () => {
    scores = { X: 0, O: 0, D: 0 };
    updateScore();
    init();
  });

  mode2p.addEventListener('click', () => {
    vsAI = false;
    mode2p.classList.add('active');
    modeAI.classList.remove('active');
    init();
  });

  modeAI.addEventListener('click', () => {
    vsAI = true;
    modeAI.classList.add('active');
    mode2p.classList.remove('active');
    init();
  });

  init();
</script>
</body>
</html>
