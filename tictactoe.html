<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #mode-toggle {
      margin-bottom: 0.7rem;
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn.active { background: #e94560; color: #fff; }

    #difficulty {
      display: none;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }
    #difficulty.visible { display: flex; }

    .diff-btn {
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      border: 2px solid #a8dadc;
      background: transparent;
      color: #a8dadc;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    .diff-btn.active { background: #a8dadc; color: #1a1a2e; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
    }

    .player-name {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      outline: none;
      border-bottom: 1px dashed transparent;
      cursor: text;
      transition: border-color 0.15s;
      min-width: 60px;
      text-align: center;
    }
    .player-name:hover,
    .player-name:focus { border-bottom-color: #555; }
    #name-x { color: #e94560; }
    #name-o { color: #a8dadc; }

    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 1px; }
    .score-box .num   { font-size: 1.6rem; font-weight: bold; }
    #score-x .num { color: #e94560; }
    #score-o .num { color: #a8dadc; }
    #score-d .num { color: #aaa; }

    #controls {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 0.55rem 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover    { opacity: 0.85; transform: translateY(-1px); }
    button:disabled { opacity: 0.3; cursor: default; transform: none; }

    #btn-restart { background: #e94560; color: #fff; }
    #btn-undo    { background: #0f3460; color: #a8dadc; }
    #btn-reset   { background: #444;    color: #eee; }
    #btn-sound   { background: #16213e; color: #555; border: 1px solid #333; }
    #btn-sound.on { color: #a8dadc; border-color: #a8dadc; }

    #history {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: #555;
      letter-spacing: 0.5px;
      min-height: 1.1rem;
    }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>

<div id="mode-toggle">
  <button class="mode-btn active" id="mode-2p">2 Players</button>
  <button class="mode-btn" id="mode-ai">vs CPU</button>
</div>

<div id="difficulty">
  <button class="diff-btn" id="diff-easy">Easy</button>
  <button class="diff-btn active" id="diff-hard">Hard</button>
</div>

<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="scoreboard">
  <div class="score-box" id="score-x">
    <span class="player-name" id="name-x" contenteditable="true" spellcheck="false">Player X</span>
    <div class="label">WINS</div>
    <div class="num" id="sx">0</div>
  </div>
  <div class="score-box" id="score-d">
    <div class="label" style="margin-top:1.4rem">DRAWS</div>
    <div class="num" id="sd">0</div>
  </div>
  <div class="score-box" id="score-o">
    <span class="player-name" id="name-o" contenteditable="true" spellcheck="false">Player O</span>
    <div class="label">WINS</div>
    <div class="num" id="so">0</div>
  </div>
</div>

<div id="controls">
  <button id="btn-restart">New Game</button>
  <button id="btn-undo" disabled>Undo</button>
  <button id="btn-reset">Reset Score</button>
  <button id="btn-sound">&#9834; Sound</button>
</div>

<div id="history"></div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, over, moveStack;
  let vsAI = false, difficulty = 'hard', soundOn = false;
  let scores = { X: 0, O: 0, D: 0 };

  const cells     = document.querySelectorAll('.cell');
  const status    = document.getElementById('status');
  const sx        = document.getElementById('sx');
  const so        = document.getElementById('so');
  const sd        = document.getElementById('sd');
  const mode2p    = document.getElementById('mode-2p');
  const modeAI    = document.getElementById('mode-ai');
  const diffPanel = document.getElementById('difficulty');
  const diffEasy  = document.getElementById('diff-easy');
  const diffHard  = document.getElementById('diff-hard');
  const btnUndo   = document.getElementById('btn-undo');
  const btnSound  = document.getElementById('btn-sound');
  const historyEl = document.getElementById('history');
  const nameX     = document.getElementById('name-x');
  const nameO     = document.getElementById('name-o');

  // ── Sound (Web Audio API, no external files) ──────────────
  let audioCtx;
  function audio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function tone(freq, type, dur, vol, delay = 0) {
    if (!soundOn) return;
    const ctx = audio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.01);
  }
  function sfxPlace() { tone(440, 'sine', 0.08, 0.2); }
  function sfxWin()   { [523, 659, 784].forEach((f, i) => tone(f, 'sine', 0.18, 0.3, i * 0.13)); }
  function sfxDraw()  { tone(260, 'sine', 0.4, 0.2); }

  // ── Helpers ───────────────────────────────────────────────
  function pname(p) {
    return (p === 'X' ? nameX : nameO).textContent.trim() || (p === 'X' ? 'Player X' : 'Player O');
  }

  function checkWin(b, p) {
    return WINS.find(([a, bx, c]) => b[a] === p && b[bx] === p && b[c] === p) || null;
  }

  function updateScore() {
    sx.textContent = scores.X;
    so.textContent = scores.O;
    sd.textContent = scores.D;
  }

  // ── Init ──────────────────────────────────────────────────
  function init() {
    board     = Array(9).fill('');
    current   = 'X';
    over      = false;
    moveStack = [];
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent    = `${pname('X')}'s turn`;
    btnUndo.disabled      = true;
    historyEl.textContent = '';
  }

  // ── Play a move ───────────────────────────────────────────
  function play(i) {
    moveStack.push({ board: [...board], current });

    board[i] = current;
    cells[i].textContent = current;
    cells[i].classList.add(current.toLowerCase(), 'taken');
    sfxPlace();

    const line = checkWin(board, current);
    if (line) {
      line.forEach(j => cells[j].classList.add('win'));
      status.textContent = `${pname(current)} wins!`;
      scores[current]++;
      updateScore();
      sfxWin();
      over = true;
      btnUndo.disabled = true;
      historyEl.textContent = `Round ${scores.X + scores.O + scores.D}: ${pname(current)} won`;
      return;
    }

    if (board.every(v => v)) {
      status.textContent = 'Draw!';
      scores.D++;
      updateScore();
      sfxDraw();
      over = true;
      btnUndo.disabled = true;
      historyEl.textContent = `Round ${scores.X + scores.O + scores.D}: Draw`;
      return;
    }

    current = current === 'X' ? 'O' : 'X';

    if (vsAI && current === 'O') {
      status.textContent = 'CPU is thinking…';
      btnUndo.disabled = true;
      setTimeout(cpuMove, 380);
    } else {
      status.textContent = `${pname(current)}'s turn`;
      btnUndo.disabled = vsAI;
    }
  }

  function handleClick(i) {
    if (over || board[i]) return;
    if (vsAI && current === 'O') return;
    play(i);
  }

  // ── Undo (2-player only) ──────────────────────────────────
  function undo() {
    if (!moveStack.length || over || vsAI) return;
    const prev = moveStack.pop();
    board   = prev.board;
    current = prev.current;
    cells.forEach((c, i) => {
      c.className   = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
      c.textContent = board[i];
    });
    status.textContent    = `${pname(current)}'s turn`;
    historyEl.textContent = '';
    btnUndo.disabled      = moveStack.length === 0;
  }

  // ── AI ────────────────────────────────────────────────────
  function minimax(b, isMax) {
    if (checkWin(b, 'O')) return  10;
    if (checkWin(b, 'X')) return -10;
    if (b.every(v => v))  return   0;
    let best = isMax ? -Infinity : Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = isMax ? 'O' : 'X';
        const s = minimax(b, !isMax);
        b[i] = '';
        best = isMax ? Math.max(best, s) : Math.min(best, s);
      }
    }
    return best;
  }

  function cpuMove() {
    const empty = board.reduce((a, v, i) => (v ? a : [...a, i]), []);
    if (!empty.length) return;

    let move;
    if (difficulty === 'easy') {
      move = empty[Math.floor(Math.random() * empty.length)];
    } else {
      let best = -Infinity;
      move = empty[0];
      for (const i of empty) {
        board[i] = 'O';
        const s = minimax(board, false);
        board[i] = '';
        if (s > best) { best = s; move = i; }
      }
    }
    play(move);
  }

  // ── Event listeners ───────────────────────────────────────
  cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));

  document.getElementById('btn-restart').addEventListener('click', init);

  document.getElementById('btn-reset').addEventListener('click', () => {
    scores = { X: 0, O: 0, D: 0 };
    updateScore();
    init();
  });

  btnUndo.addEventListener('click', undo);

  btnSound.addEventListener('click', () => {
    soundOn = !soundOn;
    btnSound.textContent = soundOn ? '♪ Sound On' : '♪ Sound';
    btnSound.classList.toggle('on', soundOn);
  });

  mode2p.addEventListener('click', () => {
    vsAI = false;
    mode2p.classList.add('active');
    modeAI.classList.remove('active');
    diffPanel.classList.remove('visible');
    nameO.contentEditable = 'true';
    if (nameO.textContent.trim() === 'CPU') nameO.textContent = 'Player O';
    init();
  });

  modeAI.addEventListener('click', () => {
    vsAI = true;
    modeAI.classList.add('active');
    mode2p.classList.remove('active');
    diffPanel.classList.add('visible');
    nameO.textContent     = 'CPU';
    nameO.contentEditable = 'false';
    init();
  });

  diffEasy.addEventListener('click', () => {
    difficulty = 'easy';
    diffEasy.classList.add('active');
    diffHard.classList.remove('active');
    init();
  });
  diffHard.addEventListener('click', () => {
    difficulty = 'hard';
    diffHard.classList.add('active');
    diffEasy.classList.remove('active');
    init();
  });

  [nameX, nameO].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
    el.addEventListener('blur', () => {
      if (!el.textContent.trim()) el.textContent = el.id === 'name-x' ? 'Player X' : 'Player O';
    });
  });

  init();
</script>
</body>
</html>
